<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskHunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="logn.css">
</head>
<body>

<div class="login-card">
    <header>
        <h1>Log in to TaskHunt</h1>
        <p class="subtitle">Log in to continue</p>
    </header>

    <div class="social-container">
        <button class="btn-social">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-social">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <div class="divider">
        <span>OR LOGIN WITH EMAIL</span>
    </div>

    <form id="loginForm" action="#">
        <div class="form-group">
            <!-- ✅ عدلنا هنا بس -->
            <input type="text" id="username" placeholder="Username or Email" required>
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="form-options">
            <label class="checkbox-group">
                <input type="checkbox">
                <span>Remember me</span>
            </label>
            <a href="#" class="forgot-pass">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <footer>
        Don't have an account? <a href="../signup/asksignup.html">Sign Up</a>
    </footer>
</div>
<script>
const users = [
    { username: "admin", password: "1234", role: "admin" },
    { username: "client", password: "1234", role: "client" },
    { username: "freelancer", password: "1234", role: "freelancer" }
];

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const user = users.find(u => u.username === username && u.password === password);

    if(user){
        if(user.role === "admin"){
            window.open("../Dashboard/Dashboard.html", "_self");
        } else if(user.role === "client"){
            window.open("../Home/client home .html", "_self");
        } else if(user.role === "freelancer"){
            window.open("../Home/freelancer'shome.html", "_self");
        }
    } else {
        alert("Invalid username or password");
    }
});
</script>

</body>
</html>
