<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskHunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0090E0; 
            --primary-hover: #00A8FF;
            --bg-body: #ffffff;
            --text-main: #001e00;
            --text-muted: #2887bb;
            --border: #cbdfe9;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0, 30, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
        }

        .social-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 25px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            background-color: #f0f7fb;
            border-color: var(--primary);
        }

        .fa-google { color: #DB4437; }
        .fa-facebook-f { color: #0090E0; }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9dbcca;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px #d0eefe;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-pass {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pass:hover {
            color: var(--primary-hover);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .social-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <header>
        <h1>Log in to TaskHunt</h1>
        <p class="subtitle">Log in to continue</p>
    </header>

    <div class="social-container">
        <button class="btn-social">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-social">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <div class="divider">
        <span>OR LOGIN WITH EMAIL</span>
    </div>

    <form action="#">
        <div class="form-group">
            <input type="email" placeholder="Username or Email" required>
        </div>

        <div class="form-group">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="form-options">
            <label class="checkbox-group">
                <input type="checkbox">
                <span>Remember me</span>
            </label>
            <a href="#" class="forgot-pass">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <footer>
        Don't have an account? <a href="../signup/asksignup.html">Sign Up</a>
    </footer>
</div>

</body>
</html>
