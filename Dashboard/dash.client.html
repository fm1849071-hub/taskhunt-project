<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHunt | Client Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-blue: #0077B8;
            --primary-dark: #005a8c;
            --primary-light: #e3f2fd;
            --bg-color: #f7f9fc;
            --text-dark: #1a2b3c;
            --text-gray: #6c7a89;
            --card-bg: rgba(255, 255, 255, 0.95);
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --border-color: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f7f9fc 0%, #eef2f7 100%);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1119 100%);
        }

        body.dark .sidebar {
            background: rgba(26, 31, 46, 0.95);
            border-right-color: rgba(255, 255, 255, 0.05);
        }

        body.dark .main-content {
            background: transparent;
        }

        body.dark .card,
        body.dark .mini-card,
        body.dark .search-area,
        body.dark .user-profile,
        body.dark .table-container,
        body.dark .modal-content,
        body.dark .freelancer-card {
            background: rgba(31, 37, 55, 0.95);
            border-color: rgba(255, 255, 255, 0.05);
            color: #e5e7eb;
        }

        body.dark .stat-value,
        body.dark .stat-label,
        body.dark td,
        body.dark .welcome-msg p,
        body.dark .job-title,
        body.dark .freelancer-name {
            color: #e5e7eb;
        }

        body.dark .sidebar nav ul li {
            color: #9ca3af;
        }

        body.dark .sidebar nav ul li.active {
            background: var(--primary-blue);
            color: white;
        }

        body.dark input,
        body.dark select,
        body.dark textarea {
            background: #1f2937;
            color: white;
            border-color: #374151;
        }

        .sidebar {
            width: 280px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .logo {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo h2 {
            font-size: 22px;
            color: var(--text-dark);
            font-weight: 700;
        }

        body.dark .logo h2 {
            color: white;
        }

        .logo p {
            font-size: 11px;
            color: var(--text-gray);
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            padding: 12px 16px;
            margin-bottom: 8px;
            color: var(--text-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav ul li i {
            width: 22px;
            font-size: 18px;
        }

        nav ul li.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 119, 184, 0.2);
        }

        nav ul li:hover:not(.active) {
            background: rgba(0, 119, 184, 0.08);
            color: var(--primary-blue);
            transform: translateX(5px);
        }

        hr {
            margin: 20px 0;
            border-color: var(--border-color);
        }

        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .welcome-msg h1 {
            font-size: 28px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .welcome-msg p {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-area {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px 20px;
            border-radius: 40px;
            width: 280px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
        }

        .search-area input {
            border: none;
            outline: none;
            padding-left: 12px;
            width: 100%;
            background: transparent;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-gray);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: white;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .user-profile img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        .dark-mode-toggle {
            cursor: pointer;
            font-size: 18px;
            color: var(--text-gray);
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 8px;
        }

        .freelancers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .freelancer-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .freelancer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        .freelancer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .freelancer-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-blue);
        }

        .freelancer-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .freelancer-title {
            font-size: 13px;
            color: var(--text-gray);
        }

        .freelancer-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .skill-tag {
            background: var(--primary-light);
            color: var(--primary-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .freelancer-rating {
            color: #ffc107;
            margin: 10px 0;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .table-container {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-gray);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            color: var(--text-dark);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-open {
            background: #d4edda;
            color: #155724;
        }

        .status-in-progress {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #cce5ff;
            color: #004085;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            padding: 6px 10px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            color: var(--text-gray);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            width: 90%;
            max-width: 550px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1100;
            animation: slideInRight 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notifications-dropdown {
            position: absolute;
            top: 60px;
            right: 120px;
            background: white;
            border-radius: 20px;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 100;
            border: 1px solid var(--border-color);
        }

        .notifications-dropdown.show {
            display: block;
        }

        .notification-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .notification-item.unread {
            background: rgba(0, 119, 184, 0.08);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-tasks"></i></div>
            <div>
                <h2>TaskHunt</h2>
                <p>Client Dashboard</p>
            </div>
        </div>
        <nav>
            <ul>
                <li class="active" data-page="dashboard"><i class="fas fa-chart-line"></i> Dashboard</li>
                <li data-page="my-jobs"><i class="fas fa-briefcase"></i> My Jobs</li>
                <li data-page="freelancers"><i class="fas fa-users"></i> Find Freelancers</li>
                <li data-page="hired"><i class="fas fa-user-check"></i> Hired</li>
                <li data-page="payments"><i class="fas fa-credit-card"></i> Payments</li>
                <li data-page="settings"><i class="fas fa-cog"></i> Settings</li>
                <hr>
                <li data-page="profile"><i class="fas fa-building"></i> Company Profile</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <div class="welcome-msg">
                <h1>Welcome back, TechCorp! 👋</h1>
                <p>Post jobs, find talent, and manage your projects</p>
            </div>
            <div class="header-actions">
                <div class="search-area">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search freelancers..." id="globalSearch">
                </div>
                <div class="dark-mode-toggle" id="darkModeToggle">
                    <i class="fas fa-moon"></i>
                </div>
                <div class="notification-bell" id="notificationBell">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationCount">3</span>
                </div>
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?u=client_company" alt="Company">
                    <span>TechCorp</span>
                </div>
            </div>
        </div>

        <div id="pageContent"></div>
    </main>

    <!-- Post Job Modal -->
    <div id="postJobModal" class="modal">
        <div class="modal-content">
            <h2>Post New Job</h2>
            <form id="postJobForm">
                <div class="form-group">
                    <label>Job Title *</label>
                    <input type="text" id="jobTitle" required placeholder="e.g., Senior React Developer">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="jobDesc" rows="4" required placeholder="Describe the job requirements, responsibilities, etc."></textarea>
                </div>
                <div class="form-group">
                    <label>Budget ($) *</label>
                    <input type="number" id="jobBudget" required placeholder="500">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="jobCategory">
                        <option>Web Development</option>
                        <option>Mobile Development</option>
                        <option>Design</option>
                        <option>Writing</option>
                        <option>Marketing</option>
                        <option>Data Science</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <select id="jobDuration">
                        <option>Less than 1 week</option>
                        <option>1-2 weeks</option>
                        <option>1 month</option>
                        <option>1-3 months</option>
                        <option>3+ months</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Post Job</button>
                <button type="button" onclick="closeModal('postJobModal')" style="margin-left: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Hire Freelancer Modal -->
    <div id="hireModal" class="modal">
        <div class="modal-content">
            <h2>Hire Freelancer</h2>
            <form id="hireForm">
                <div class="form-group">
                    <label>Freelancer Name</label>
                    <input type="text" id="hireFreelancerName" readonly>
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <select id="hireJobSelect" required>
                        <option value="">Select a job to assign</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Offer Amount ($)</label>
                    <input type="number" id="hireAmount" required>
                </div>
                <div class="form-group">
                    <label>Message to Freelancer</label>
                    <textarea id="hireMessage" rows="3" placeholder="Explain the project details..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Send Offer</button>
                <button type="button" onclick="closeModal('hireModal')" style="margin-left: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <div id="notificationsDropdown" class="notifications-dropdown"></div>

    <script>
        // ========== CLIENT DASHBOARD STATE ==========
        let currentPage = 'dashboard';
        let selectedFreelancer = null;

        // Client's posted jobs
        let myJobs = [
            { id: 1, title: 'E-commerce Website Development', description: 'Build a full e-commerce site with payment integration', budget: 3500, status: 'Open', category: 'Web Development', posted: '2024-03-10', proposals: 5 },
            { id: 2, title: 'Mobile App UI/UX Design', description: 'Design modern UI for fitness app', budget: 1200, status: 'In Progress', category: 'Design', posted: '2024-03-05', proposals: 8 },
            { id: 3, title: 'Content Writing for Blog', description: 'Write 10 SEO-optimized articles', budget: 800, status: 'Open', category: 'Writing', posted: '2024-03-12', proposals: 3 }
        ];

        // Hired freelancers
        let hiredFreelancers = [
            { id: 1, name: 'Alex Johnson', skill: 'React Developer', job: 'E-commerce Website Development', budget: 3500, startDate: '2024-03-15', status: 'In Progress', rating: 4.8 },
            { id: 2, name: 'Maria Garcia', skill: 'UI Designer', job: 'Mobile App UI/UX Design', budget: 1200, startDate: '2024-03-10', status: 'In Progress', rating: 4.9 }
        ];

        // Available freelancers (for hiring)
        let freelancers = [
            { id: 1, name: 'John Doe', title: 'Full Stack Developer', skills: ['React', 'Node.js', 'Python'], rating: 4.9, hourlyRate: 45, completedJobs: 127, avatar: 'JD' },
            { id: 2, name: 'Sarah Smith', title: 'UI/UX Designer', skills: ['Figma', 'Adobe XD', 'UI Design'], rating: 4.8, hourlyRate: 35, completedJobs: 89, avatar: 'SS' },
            { id: 3, name: 'Mike Chen', title: 'WordPress Expert', skills: ['WordPress', 'PHP', 'CSS'], rating: 4.7, hourlyRate: 30, completedJobs: 156, avatar: 'MC' },
            { id: 4, name: 'Emily Brown', title: 'Content Writer', skills: ['SEO Writing', 'Blog Posts', 'Copywriting'], rating: 4.9, hourlyRate: 25, completedJobs: 234, avatar: 'EB' }
        ];

        // Payment history
        let payments = [
            { id: 1, freelancer: 'Alex Johnson', job: 'E-commerce Website Development', amount: 1500, date: '2024-03-20', status: 'Paid' },
            { id: 2, freelancer: 'Maria Garcia', job: 'Mobile App UI/UX Design', amount: 600, date: '2024-03-18', status: 'Paid' },
            { id: 3, freelancer: 'John Doe', job: 'API Integration', amount: 800, date: '2024-03-25', status: 'Pending' }
        ];

        let notifications = [
            { id: 1, message: 'New proposal received for "E-commerce Website Development"', time: '5 min ago', read: false },
            { id: 2, message: 'Alex Johnson completed milestone 1', time: '1 hour ago', read: false },
            { id: 3, message: 'Payment of $1500 was successful', time: '2 hours ago', read: false }
        ];

        // Helper Functions
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" style="color: ${type === 'success' ? '#28a745' : '#dc3545'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Post new job
        function postJob(jobData) {
            const newJob = {
                id: Date.now(),
                title: jobData.title,
                description: jobData.description,
                budget: parseInt(jobData.budget),
                status: 'Open',
                category: jobData.category,
                posted: new Date().toISOString().split('T')[0],
                proposals: 0
            };
            myJobs.push(newJob);
            showToast('Job posted successfully! Freelancers can now apply');
            renderCurrentPage();
        }

        // Delete a job
        function deleteJob(id) {
            const job = myJobs.find(j => j.id === id);
            if (job && job.status === 'Open') {
                if (confirm('Delete this job posting?')) {
                    myJobs = myJobs.filter(j => j.id !== id);
                    showToast('Job deleted');
                    renderCurrentPage();
                }
            } else {
                showToast('Cannot delete job that is already in progress', 'error');
            }
        }

        // View proposals for a job
        function viewProposals(jobId) {
            const job = myJobs.find(j => j.id === jobId);
            showToast(`You have ${job.proposals} proposals for "${job.title}"`, 'success');
        }

        // Hire freelancer
        function openHireModal(freelancer) {
            selectedFreelancer = freelancer;
            document.getElementById('hireFreelancerName').value = freelancer.name;
            
            // Populate job select with open jobs
            const jobSelect = document.getElementById('hireJobSelect');
            jobSelect.innerHTML = '<option value="">Select a job</option>';
            myJobs.filter(j => j.status === 'Open').forEach(job => {
                jobSelect.innerHTML += `<option value="${job.id}">${job.title} ($${job.budget})</option>`;
            });
            
            document.getElementById('hireAmount').value = '';
            document.getElementById('hireMessage').value = '';
            document.getElementById('hireModal').style.display = 'flex';
        }

        function hireFreelancer(jobId, amount, message) {
            const job = myJobs.find(j => j.id == jobId);
            if (!job) {
                showToast('Job not found', 'error');
                return false;
            }
            
            // Add to hired list
            const newHire = {
                id: Date.now(),
                name: selectedFreelancer.name,
                skill: selectedFreelancer.title,
                job: job.title,
                budget: parseInt(amount),
                startDate: new Date().toISOString().split('T')[0],
                status: 'In Progress',
                rating: selectedFreelancer.rating
            };
            hiredFreelancers.push(newHire);
            
            // Update job status
            job.status = 'In Progress';
            
            // Add notification
            notifications.unshift({
                id: Date.now(),
                message: `You hired ${selectedFreelancer.name} for "${job.title}"`,
                time: 'Just now',
                read: false
            });
            
            showToast(`Offer sent to ${selectedFreelancer.name}!`);
            return true;
        }

        // Complete job and release payment
        function completeJob(hireId) {
            if (confirm('Mark this job as completed and release final payment?')) {
                const hire = hiredFreelancers.find(h => h.id === hireId);
                if (hire) {
                    hire.status = 'Completed';
                    // Add to payments
                    payments.unshift({
                        id: Date.now(),
                        freelancer: hire.name,
                        job: hire.job,
                        amount: hire.budget,
                        date: new Date().toISOString().split('T')[0],
                        status: 'Pending'
                    });
                    showToast(`Job completed! Payment of $${hire.budget} will be processed`);
                    renderCurrentPage();
                }
            }
        }

        // Render Functions
        function renderDashboard() {
            const openJobs = myJobs.filter(j => j.status === 'Open').length;
            const inProgress = hiredFreelancers.filter(h => h.status === 'In Progress').length;
            const totalSpent = payments.filter(p => p.status === 'Paid').reduce((sum, p) => sum + p.amount, 0);
            
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
                        <div class="stat-value">${myJobs.length}</div>
                        <div class="stat-label">Total Jobs Posted</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-file-signature"></i></div>
                        <div class="stat-value">${openJobs}</div>
                        <div class="stat-label">Open Positions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                        <div class="stat-value">${inProgress}</div>
                        <div class="stat-label">Active Projects</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                        <div class="stat-value">$${totalSpent.toLocaleString()}</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                </div>
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-clock"></i> Recent Activity</h3>
                    </div>
                    <div id="recentActivity"></div>
                </div>
            `;
        }

        function renderMyJobs() {
            return `
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-briefcase"></i> My Posted Jobs</h3>
                        <button class="btn-primary" onclick="openPostJobModal()"><i class="fas fa-plus"></i> Post New Job</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Budget</th>
                                <th>Proposals</th>
                                <th>Status</th>
                                <th>Posted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="myJobsTableBody"></tbody>
                    </table>
                </div>
            `;
        }

        function renderFreelancers() {
            const searchTerm = document.getElementById('globalSearch')?.value.toLowerCase() || '';
            const filtered = freelancers.filter(f => 
                f.name.toLowerCase().includes(searchTerm) || 
                f.title.toLowerCase().includes(searchTerm) ||
                f.skills.some(s => s.toLowerCase().includes(searchTerm))
            );
            
            return `
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-users"></i> Find Freelancers</h3>
                        <div class="search-filter">
                            <input type="text" id="freelancerSearch" placeholder="Search by name, skill..." style="width: 220px;">
                        </div>
                    </div>
                    <div class="freelancers-grid" id="freelancersGrid">
                        ${filtered.map(f => `
                            <div class="freelancer-card">
                                <div class="freelancer-header">
                                    <div class="freelancer-avatar">${f.avatar}</div>
                                    <div>
                                        <div class="freelancer-name">${f.name}</div>
                                        <div class="freelancer-title">${f.title}</div>
                                    </div>
                                </div>
                                <div class="freelancer-skills">
                                    ${f.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                                </div>
                                <div class="freelancer-rating">
                                    ${'★'.repeat(Math.floor(f.rating))}${f.rating % 1 ? '½' : ''} (${f.rating}) • ${f.completedJobs} jobs
                                </div>
                                <div style="margin: 10px 0;"><strong>$${f.hourlyRate}/hr</strong></div>
                                <button class="btn-primary" onclick="openHireModal(${JSON.stringify(f).replace(/"/g, '&quot;')})">Hire Now</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderHired() {
            return `
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-user-check"></i> Hired Freelancers</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Freelancer</th>
                                <th>Skill</th>
                                <th>Project</th>
                                <th>Budget</th>
                                <th>Start Date</th>
                                <th>Status</th>
                                <th>Rating</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="hiredTableBody"></tbody>
                    </table>
                </div>
            `;
        }

        function renderPayments() {
            const totalPaid = payments.filter(p => p.status === 'Paid').reduce((sum, p) => sum + p.amount, 0);
            const pendingPayments = payments.filter(p => p.status === 'Pending').reduce((sum, p) => sum + p.amount, 0);
            
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-value">$${totalPaid.toLocaleString()}</div>
                        <div class="stat-label">Total Paid</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-value">$${pendingPayments.toLocaleString()}</div>
                        <div class="stat-label">Pending Payments</div>
                    </div>
                </div>
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-credit-card"></i> Payment History</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Freelancer</th>
                                <th>Project</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody"></tbody>
                    </table>
                </div>
            `;
        }

        function renderSettings() {
            return `
                <div class="table-container">
                    <h3><i class="fas fa-building"></i> Company Settings</h3>
                    <form id="profileForm" style="margin-top: 20px;">
                        <div class="form-group"><label>Company Name</label><input type="text" id="companyName" value="TechCorp Solutions"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="companyEmail" value="contact@techcorp.com"></div>
                        <div class="form-group"><label>Phone</label><input type="text" id="companyPhone" value="+1 (555) 123-4567"></div>
                        <div class="form-group"><label>Address</label><input type="text" id="companyAddress" value="123 Business Ave, San Francisco, CA"></div>
                        <button type="submit" class="btn-primary">Update Company Info</button>
                    </form>
                    <hr style="margin: 30px 0;">
                    <h3><i class="fas fa-bell"></i> Notification Preferences</h3>
                    <div class="form-group"><label><input type="checkbox" id="proposalNotif" checked> New proposals on my jobs</label></div>
                    <div class="form-group"><label><input type="checkbox" id="milestoneNotif" checked> Milestone updates</label></div>
                    <div class="form-group"><label><input type="checkbox" id="paymentNotif" checked> Payment confirmations</label></div>
                    <button onclick="saveSettings()" class="btn-primary">Save Preferences</button>
                </div>
            `;
        }

        function renderProfile() {
            return renderSettings();
        }

        function renderMyJobsTable() {
            const tbody = document.getElementById('myJobsTableBody');
            if (tbody) {
                tbody.innerHTML = myJobs.map(job => `
                    <tr>
                        <td><strong>${job.title}</strong></td>
                        <td>${job.category}</td>
                        <td>$${job.budget}</td>
                        <td>${job.proposals}</td>
                        <td><span class="status-badge status-${job.status === 'Open' ? 'open' : 'in-progress'}">${job.status}</span></td>
                        <td>${job.posted}</td>
                        <td class="action-buttons">
                            ${job.status === 'Open' ? `
                                <button class="btn-icon" onclick="viewProposals(${job.id})"><i class="fas fa-users"></i></button>
                                <button class="btn-icon" onclick="deleteJob(${job.id})"><i class="fas fa-trash"></i></button>
                            ` : '<span style="color:gray;">In Progress</span>'}
                        </td>
                    </tr>
                `).join('');
            }
        }

        function renderHiredTable() {
            const tbody = document.getElementById('hiredTableBody');
            if (tbody) {
                tbody.innerHTML = hiredFreelancers.map(hire => `
                    <tr>
                        <td><strong>${hire.name}</strong></td>
                        <td>${hire.skill}</td>
                        <td>${hire.job}</td>
                        <td>$${hire.budget}</td>
                        <td>${hire.startDate}</td>
                        <td><span class="status-badge status-${hire.status === 'In Progress' ? 'in-progress' : 'completed'}">${hire.status}</span></td>
                        <td>${'★'.repeat(Math.floor(hire.rating))}</td>
                        <td>
                            ${hire.status === 'In Progress' ? `<button class="btn-icon" onclick="completeJob(${hire.id})"><i class="fas fa-check-circle" style="color:#28a745;"></i></button>` : ''}
                        </td>
                    </tr>
                `).join('');
            }
        }

        function renderPaymentsTable() {
            const tbody = document.getElementById('paymentsTableBody');
            if (tbody) {
                tbody.innerHTML = payments.map(p => `
                    <tr>
                        <td><strong>${p.freelancer}</strong></td>
                        <td>${p.job}</td>
                        <td>$${p.amount}</td>
                        <td>${p.date}</td>
                        <td><span class="status-badge status-${p.status === 'Paid' ? 'open' : 'pending'}">${p.status}</span></td>
                    </tr>
                `).join('');
            }
        }

        function renderRecentActivity() {
            const container = document.getElementById('recentActivity');
            if (container) {
                const activities = notifications.slice(0, 5);
                container.innerHTML = activities.map(act => `
                    <div style="padding: 12px 0; border-bottom: 1px solid var(--border-color);">
                        <i class="fas fa-circle" style="font-size: 8px; color: var(--primary-blue); margin-right: 12px;"></i>
                        ${act.message}
                        <div style="font-size: 11px; color: var(--text-gray); margin-top: 4px;">${act.time}</div>
                    </div>
                `).join('');
                if(activities.length === 0) container.innerHTML = '<div style="padding: 12px;">No recent activity</div>';
            }
        }

        function renderCurrentPage() {
            const contentDiv = document.getElementById('pageContent');
            switch(currentPage) {
                case 'dashboard':
                    contentDiv.innerHTML = renderDashboard();
                    renderRecentActivity();
                    break;
                case 'my-jobs':
                    contentDiv.innerHTML = renderMyJobs();
                    renderMyJobsTable();
                    break;
                case 'freelancers':
                    contentDiv.innerHTML = renderFreelancers();
                    const freelancerSearch = document.getElementById('freelancerSearch');
                    if(freelancerSearch) {
                        freelancerSearch.addEventListener('input', () => renderCurrentPage());
                    }
                    break;
                case 'hired':
                    contentDiv.innerHTML = renderHired();
                    renderHiredTable();
                    break;
                case 'payments':
                    contentDiv.innerHTML = renderPayments();
                    renderPaymentsTable();
                    break;
                case 'settings':
                    contentDiv.innerHTML = renderSettings();
                    break;
                case 'profile':
                    contentDiv.innerHTML = renderProfile();
                    break;
            }
        }

        function openPostJobModal() {
            document.getElementById('postJobModal').style.display = 'flex';
        }

        function saveSettings() {
            showToast('Settings saved successfully');
        }

        // Notifications
        function renderNotifications() {
            const dropdown = document.getElementById('notificationsDropdown');
            if (dropdown) {
                dropdown.innerHTML = notifications.map(notif => `
                    <div class="notification-item ${!notif.read ? 'unread' : ''}" onclick="markNotificationRead(${notif.id})">
                        <div><strong>${notif.message}</strong></div>
                        <div style="font-size: 11px; color: var(--text-gray);">${notif.time}</div>
                    </div>
                `).join('');
                document.getElementById('notificationCount').innerText = notifications.filter(n => !n.read).length;
            }
        }

        function markNotificationRead(id) {
            const n = notifications.find(n => n.id === id);
            if(n) n.read = true;
            renderNotifications();
        }

        // Event Listeners
        document.getElementById('postJobForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            postJob({
                title: document.getElementById('jobTitle').value,
                description: document.getElementById('jobDesc').value,
                budget: document.getElementById('jobBudget').value,
                category: document.getElementById('jobCategory').value
            });
            closeModal('postJobModal');
            e.target.reset();
        });

        document.getElementById('hireForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const jobId = document.getElementById('hireJobSelect').value;
            const amount = document.getElementById('hireAmount').value;
            const message = document.getElementById('hireMessage').value;
            
            if (!jobId) {
                showToast('Please select a job', 'error');
                return;
            }
            
            if (hireFreelancer(jobId, amount, message)) {
                closeModal('hireModal');
                renderCurrentPage();
            }
        });

        document.getElementById('profileForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Company profile updated successfully');
        });

        document.querySelectorAll('.sidebar nav ul li').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if (page) {
                    document.querySelectorAll('.sidebar nav ul li').forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    currentPage = page;
                    renderCurrentPage();
                }
            });
        });

        document.getElementById('darkModeToggle')?.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        document.getElementById('notificationBell')?.addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('notificationsDropdown');
            dropdown.classList.toggle('show');
            renderNotifications();
        });

        document.addEventListener('click', () => {
            document.getElementById('notificationsDropdown')?.classList.remove('show');
        });

        // Global search
        document.getElementById('globalSearch')?.addEventListener('input', () => {
            if(currentPage === 'freelancers') renderCurrentPage();
        });

        // Initialize
        renderCurrentPage();

        // Make functions global
        window.openPostJobModal = openPostJobModal;
        window.deleteJob = deleteJob;
        window.viewProposals = viewProposals;
        window.openHireModal = openHireModal;
        window.completeJob = completeJob;
        window.closeModal = closeModal;
        window.saveSettings = saveSettings;
        window.markNotificationRead = markNotificationRead;
    </script>
</body>
</html>
