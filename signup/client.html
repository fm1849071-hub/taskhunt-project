<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Sign Up | Join Our Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary:  #0090E0;
            --primary-hover: #00A8FF;
            --bg-body: #ffffff;
            --text-main: #001e00;
            --text-muted: #2887bb;
            --border: #cbdfe9;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0, 30, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .signup-card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Social Buttons */
        .social-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 25px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            background-color: #c3deec;
            border-color: #d0e7f3;
        }

        .fa-google { color: #DB4437; }
        .fa-facebook-f { color: #0090E0; }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #c1e0f1;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 12px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Form Styling */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px #b7e3f9;
        }

        textarea {
            resize: none;
            height: 90px;
        }

        /* File Upload Styling */
        input[type="file"] {
            padding: 8px;
            background: #bbdcee;
            cursor: pointer;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            cursor: pointer;
            font-size: 14px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background-color: var(--text-muted);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .signup-card {
                padding: 30px 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .social-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="signup-card">
    <header>
        <h1>Sign up as a client</h1>
        <p class="subtitle">Create your profile and start earning</p>
    </header>

    <div class="social-container">
        <button class="btn-social">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-social">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <div class="divider">
        <span>OR</span>
    </div>

    <form action="#">
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email"  required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="At least 8 characters" required>
        </div>

        <label class="checkbox-group">
            <input type="checkbox" required>
           <span>I agree to the Terms of Service and<a href="../signup/T&C.html"> Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn-submit">Create My Account</button>
    </form>

    <footer>
        Already have an account? <a href="../login/login.html">Log In</a>
    </footer>
</div>

</body>
</html>
