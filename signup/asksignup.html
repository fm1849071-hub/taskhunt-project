<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a client or freelancer</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 40px;
            color: #001e00;
        }

        .selection-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            border: 2px solid #a4d6f1;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-align: left;
        }

        .card:hover {
            border-color: #0077B8;
        }

        .card.selected {
            border-color: #0077B8;
        }

        .card input {
            display: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .icon {
            font-size: 24px;
        }

        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #b8daec;
            border-radius: 50%;
            position: relative;
        }

        input:checked + .card-content .radio-circle {
            border-color: #0077B8;
            background-color: #0077B8;
        }

        input:checked + .card-content .radio-circle::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .card p {
            font-size: 18px;
            font-weight: 500;
            margin: 0;
            line-height: 1.4;
            color: #001e00;
        }

        .join-btn {
            background-color: #0077B8;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .join-btn:hover {
            background-color: #0077B8;
        }

        .login-text {
            margin-top: 20px;
            color: #0a3145;
        }

        .login-text a {
            color: #0077B8;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Join as a client or freelancer</h1>

    <div class="selection-wrapper">
        <label class="card selected">
            <input type="radio" name="user-type" value="client" checked>
            <div class="card-content">
                <div class="card-header">
                    <span class="icon">💼</span>
                    <div class="radio-circle"></div>
                </div>
                <p>I'm a client, hiring for a project</p>
            </div>
        </label>

        <label class="card">
            <input type="radio" name="user-type" value="freelancer">
            <div class="card-content">
                <div class="card-header">
                    <span class="icon">💻</span>
                    <div class="radio-circle"></div>
                </div>
                <p>I'm a freelancer, looking for work</p>
            </div>
        </label>
    </div>

    <button class="join-btn" id="joinBtn">Join as a Client</button>

    <p class="login-text">
        Already have an account? <a href="../login/login.html">Log In</a>
    </p>
</div>

<script>
const cards = document.querySelectorAll(".card");
const radios = document.querySelectorAll("input[name='user-type']");
const joinBtn = document.getElementById("joinBtn");

cards.forEach((card, index) => {
    card.addEventListener("click", () => {
        cards.forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        radios[index].checked = true;

        if (radios[index].value === "freelancer") {
            joinBtn.innerText = "Join as a Freelancer";
        } else {
            joinBtn.innerText = "Join as a Client";
        }
    });
});

// 🔴 ده الجزء المهم الجديد
joinBtn.addEventListener("click", () => {
    const selectedRadio = document.querySelector("input[name='user-type']:checked");

    if (!selectedRadio) {
        alert("Please choose Freelancer or Client first");
        return;
    }

    if (selectedRadio.value === "freelancer") {
        window.location.href = "../signup/signup.html"; // غيرها باسم صفحتك
    } else {
        window.location.href = "client.html"; // غيرها باسم صفحتك
    }
});
</script>

</body>
</html>
